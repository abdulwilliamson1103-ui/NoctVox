<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Aum — NoctVox</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0B0F14;font-family:'Courier New',monospace}
canvas{display:block;position:fixed;inset:0}
#svg-hud{position:fixed;inset:0;pointer-events:none;z-index:5}
#hud{
  position:fixed;top:0;left:0;right:0;
  display:flex;flex-direction:column;align-items:center;
  padding-top:28px;pointer-events:none;z-index:10;gap:6px
}
#mode-token{color:#3DF2E0;font-size:11px;letter-spacing:.35em;opacity:.92}
#house-word{color:rgba(61,242,224,.55);font-size:9px;letter-spacing:.55em}
#torch-state{color:rgba(61,242,224,.35);font-size:8px;letter-spacing:.65em}
#input-wrap{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;justify-content:center;padding:24px;z-index:20
}
#expr{
  width:100%;max-width:420px;
  background:rgba(11,15,20,.85);
  border:1px solid rgba(61,242,224,.18);
  border-radius:2px;color:#3DF2E0;
  font-family:'Courier New',monospace;font-size:12px;
  letter-spacing:.2em;padding:12px 18px;outline:none;text-align:center
}
#expr::placeholder{color:rgba(61,242,224,.2);letter-spacing:.3em}
#expr:focus{border-color:rgba(61,242,224,.45);box-shadow:0 0 12px rgba(61,242,224,.07)}
#echo{
  position:fixed;bottom:78px;left:0;right:0;
  display:flex;justify-content:center;
  pointer-events:none;z-index:15;padding:0 24px
}
#echo-text{
  max-width:480px;color:rgba(61,242,224,.65);
  font-size:11px;line-height:1.7;letter-spacing:.05em;
  text-align:center;opacity:0;transition:opacity .6s
}
#echo-text.on{opacity:1}
#boot{
  position:fixed;inset:0;background:#0B0F14;
  display:flex;align-items:center;justify-content:center;z-index:100;
  transition:opacity 1.1s
}
#boot.out{opacity:0;pointer-events:none}
#boot span{color:#3DF2E0;font-size:11px;letter-spacing:.5em;animation:bp 2s ease-in-out infinite}
@keyframes bp{0%,100%{opacity:.35}50%{opacity:1}}
</style>
</head>
<body>

<div id="boot"><span>AUM</span></div>

<svg id="svg-hud" xmlns="http://www.w3.org/2000/svg"></svg>

<div id="hud">
  <div id="mode-token">H7 · T-HR · R-MO · E-CE</div>
  <div id="house-word">SUBCONSCIOUS</div>
  <div id="torch-state">FLOWING</div>
</div>

<div id="echo"><div id="echo-text"></div></div>

<div id="input-wrap">
  <input id="expr" type="text" placeholder="speak..." autocomplete="off" autocorrect="off" spellcheck="false">
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── State ───────────────────────────────────────────────────────────────────
const UID = localStorage.getItem('aum_uid') || (()=>{
  const id='u_'+Math.random().toString(36).slice(2,10);
  localStorage.setItem('aum_uid',id); return id;
})();

const S = {
  energy: 0.5,
  houseMasses: new Array(12).fill(0),
  torchWeights: new Array(7).fill(0),
  routedTorch: 'T-HR',
  routedRing:  'R-MO',
  routedEcho:  'E-CE',
  dominantHouse: 7,
};

const TORCH_IDS   = ['T-HR','T-RO','T-SA','T-SU','T-TA','T-TY','T-CW'];
const TORCH_WORDS = {
  'T-HR':'RESONATING','T-RO':'GROUNDED','T-SA':'FLOWING',
  'T-SU':'IGNITED','T-TA':'SPEAKING','T-TY':'SEEING','T-CW':'EXPANDING'
};
const HOUSE_WORDS = [
  'IDENTITY','VALUES','VOICE','HOME','CREATIVITY','HEALTH',
  'PARTNERSHIPS','TRANSFORMATION','PHILOSOPHY','LEGACY','COMMUNITY','SUBCONSCIOUS'
];

// ─── Three.js ────────────────────────────────────────────────────────────────
const W = ()=>window.innerWidth, H = ()=>window.innerHeight;

const renderer = new THREE.WebGLRenderer({antialias:true,alpha:false});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(W(),H());
renderer.setClearColor(0x0B0F14,1);
document.body.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60,W()/H(),.1,1000);
camera.position.z = 3.8;

const root = new THREE.Group();
scene.add(root);

// ─── Shaders ─────────────────────────────────────────────────────────────────
const VERT = `
uniform float uTime;
uniform float uEnergy;
attribute float aSize;
attribute vec3  aColor;
attribute float aAlpha;
attribute float aPhase;
varying vec3  vColor;
varying float vAlpha;

float h(vec3 p){return fract(sin(dot(p,vec3(127.1,311.7,74.7)))*43758.5453);}
float n3(vec3 p){
  vec3 i=floor(p), f=fract(p);
  f=f*f*(3.-2.*f);
  return mix(
    mix(mix(h(i),h(i+vec3(1,0,0)),f.x), mix(h(i+vec3(0,1,0)),h(i+vec3(1,1,0)),f.x),f.y),
    mix(mix(h(i+vec3(0,0,1)),h(i+vec3(1,0,1)),f.x), mix(h(i+vec3(0,1,1)),h(i+vec3(1,1,1)),f.x),f.y),
    f.z);
}
float fbm(vec3 p){
  float v=0.,a=.5;
  for(int i=0;i<5;i++){v+=a*n3(p);p=p*2.1+vec3(100.);a*=.5;}
  return v;
}
void main(){
  vColor=aColor; vAlpha=aAlpha;
  float t=uTime*.13+aPhase;
  vec3 nc=position*1.9+vec3(t,t*.68,t*.51);
  float nv=fbm(nc);
  float pulse=1.+(nv-.5)*.45*(.4+uEnergy*.9);
  vec3 pos=position*pulse;
  float td=fbm(nc+3.9)*.18*uEnergy;
  vec3 tang=normalize(cross(position,vec3(0.,1.,.07)));
  pos+=tang*td;
  vec4 mv=modelViewMatrix*vec4(pos,1.);
  gl_PointSize=aSize*(320./-mv.z);
  gl_Position=projectionMatrix*mv;
}`;

const FRAG = `
varying vec3  vColor;
varying float vAlpha;
void main(){
  vec2 uv=gl_PointCoord-.5;
  float d=length(uv);
  if(d>.5) discard;
  float a=smoothstep(.5,.04,d)*vAlpha;
  gl_FragColor=vec4(vColor,a);
}`;

function makeMat(uTime,uEnergy){
  return new THREE.ShaderMaterial({
    uniforms:{uTime:{value:uTime},uEnergy:{value:uEnergy}},
    vertexShader:VERT,fragmentShader:FRAG,
    blending:THREE.AdditiveBlending,depthWrite:false,transparent:true
  });
}

// ─── Sphere Orbs ─────────────────────────────────────────────────────────────
// 110 strands × ~4 orbs = ~440 orbs total (rich density)
(function buildSphere(){
  const NS=110, NOP=4, N=NS*NOP;
  const pos=new Float32Array(N*3), col=new Float32Array(N*3),
        sz=new Float32Array(N),   al=new Float32Array(N), ph=new Float32Array(N);

  // Palette: deep teal → bright cyan-white (fire aesthetic)
  const PALS=[
    [[.04,.72,.68],[.10,.92,.88],[.28,.99,.99]],
    [[.00,.55,.65],[.05,.82,.88],[.16,.96,.99]],
    [[.08,.68,.58],[.18,.88,.78],[.38,.99,.94]],
    [[.00,.48,.52],[.03,.72,.78],[.06,.94,.90]],
    [[.12,.60,.50],[.22,.82,.72],[.42,.98,.88]],
  ];

  const golden=Math.PI*(1+Math.sqrt(5));
  for(let s=0;s<NS;s++){
    const phi=Math.acos(1-2*(s+.5)/NS);
    const theta=golden*s;
    const bx=Math.sin(phi)*Math.cos(theta);
    const by=Math.cos(phi);
    const bz=Math.sin(phi)*Math.sin(theta);
    const pal=PALS[s%PALS.length];
    for(let o=0;o<NOP;o++){
      const idx=s*NOP+o;
      const t=o/NOP;
      const r=1.0+t*.28+Math.random()*.07;
      const jit=.09*(1+t);
      const nx=bx+(Math.random()-.5)*jit;
      const ny=by+(Math.random()-.5)*jit;
      const nz=bz+(Math.random()-.5)*jit;
      const l=Math.sqrt(nx*nx+ny*ny+nz*nz);
      pos[idx*3]=nx/l*r; pos[idx*3+1]=ny/l*r; pos[idx*3+2]=nz/l*r;
      const pi=Math.min(Math.floor(t*(pal.length-1)),pal.length-2);
      const pf=t*(pal.length-1)-pi;
      col[idx*3]=pal[pi][0]*(1-pf)+pal[pi+1][0]*pf;
      col[idx*3+1]=pal[pi][1]*(1-pf)+pal[pi+1][1]*pf;
      col[idx*3+2]=pal[pi][2]*(1-pf)+pal[pi+1][2]*pf;
      sz[idx]=3.2+t*2.8+Math.random()*2.2;
      al[idx]=.55+t*.32+Math.random()*.1;
      ph[idx]=Math.random()*Math.PI*2;
    }
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.BufferAttribute(pos,3));
  g.setAttribute('aColor',  new THREE.BufferAttribute(col,3));
  g.setAttribute('aSize',   new THREE.BufferAttribute(sz,1));
  g.setAttribute('aAlpha',  new THREE.BufferAttribute(al,1));
  g.setAttribute('aPhase',  new THREE.BufferAttribute(ph,1));
  root.add(new THREE.Points(g, makeMat(0,.5)));
})();

// ─── Wisps ───────────────────────────────────────────────────────────────────
(function buildWisps(){
  const N=120;
  const pos=new Float32Array(N*3),col=new Float32Array(N*3),
        sz=new Float32Array(N),  al=new Float32Array(N), ph=new Float32Array(N);
  const WC=[[.03,.70,.76],[.09,.58,.68],[.00,.88,.82],[.18,.68,.62]];
  for(let i=0;i<N;i++){
    const th=Math.random()*Math.PI*2, ph2=Math.acos(2*Math.random()-1);
    const r=1.15+Math.random()*.55;
    pos[i*3]=r*Math.sin(ph2)*Math.cos(th);
    pos[i*3+1]=r*Math.cos(ph2);
    pos[i*3+2]=r*Math.sin(ph2)*Math.sin(th);
    const c=WC[i%WC.length];
    col[i*3]=c[0]; col[i*3+1]=c[1]; col[i*3+2]=c[2];
    sz[i]=1.8+Math.random()*4.2;
    al[i]=.12+Math.random()*.18;
    ph[i]=Math.random()*Math.PI*6;
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.BufferAttribute(pos,3));
  g.setAttribute('aColor',  new THREE.BufferAttribute(col,3));
  g.setAttribute('aSize',   new THREE.BufferAttribute(sz,1));
  g.setAttribute('aAlpha',  new THREE.BufferAttribute(al,1));
  g.setAttribute('aPhase',  new THREE.BufferAttribute(ph,1));
  const mat=makeMat(0,.5);
  mat.uniforms.uEnergy.value=.35;
  root.add(new THREE.Points(g,mat));
})();

// ─── Fire Spits ──────────────────────────────────────────────────────────────
// 25 live streaks that recycle
const spits=[];
function spawnSpit(){
  const phi=Math.acos(2*Math.random()-1);
  const theta=Math.random()*Math.PI*2;
  const nx=Math.sin(phi)*Math.cos(theta);
  const ny=Math.cos(phi);
  const nz=Math.sin(phi)*Math.sin(theta);
  const NP=14;
  const pos=new Float32Array(NP*3),col=new Float32Array(NP*3),
        sz=new Float32Array(NP), al=new Float32Array(NP), ph=new Float32Array(NP);
  const basePhase=Math.random()*10;
  for(let i=0;i<NP;i++){
    const t=i/NP;
    const r=1.0+t*.9;
    pos[i*3]=nx*r; pos[i*3+1]=ny*r; pos[i*3+2]=nz*r;
    col[i*3]=.08+t*.2; col[i*3+1]=.88+t*.12; col[i*3+2]=.92;
    sz[i]=3.5*(1-t*.65); al[i]=.88*(1-t); ph[i]=basePhase;
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.BufferAttribute(pos,3));
  g.setAttribute('aColor',  new THREE.BufferAttribute(col,3));
  g.setAttribute('aSize',   new THREE.BufferAttribute(sz,1));
  g.setAttribute('aAlpha',  new THREE.BufferAttribute(al,1));
  g.setAttribute('aPhase',  new THREE.BufferAttribute(ph,1));
  const mat=makeMat(0,.8);
  const pts=new THREE.Points(g,mat);
  root.add(pts);
  return {pts,mat,life:0,maxLife:1.2+Math.random()*.9};
}
for(let i=0;i<25;i++) spits.push(spawnSpit());

// ─── SVG Overlay ─────────────────────────────────────────────────────────────
const svgEl=document.getElementById('svg-hud');
let arcEls=[], lineEls=[];

function initSVG(){
  svgEl.innerHTML='';
  arcEls=[]; lineEls=[];
  const cx=W()/2, cy=H()/2;
  // Approximate screen-space sphere radius
  const v0=new THREE.Vector3(0,0,0).project(camera);
  const v1=new THREE.Vector3(1,0,0).project(camera);
  const screenR=Math.abs((v1.x-v0.x)/2*W());
  const arcR=screenR+26;
  const tuneY0=cy+screenR+38;
  const tuneMaxH=64;
  const tuneSpan=Math.min(screenR*1.3,130);

  // 12 arc segments
  const ag=document.createElementNS('http://www.w3.org/2000/svg','g');
  for(let i=0;i<12;i++){
    const a0=(i/12)*Math.PI*2-Math.PI/2;
    const a1=((i+1)/12)*Math.PI*2-Math.PI/2-.025;
    const x1=cx+arcR*Math.cos(a0), y1=cy+arcR*Math.sin(a0);
    const x2=cx+arcR*Math.cos(a1), y2=cy+arcR*Math.sin(a1);
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',`M${x1} ${y1} A${arcR} ${arcR} 0 0 1 ${x2} ${y2}`);
    p.setAttribute('fill','none');
    p.setAttribute('stroke','#3DF2E0');
    p.setAttribute('stroke-width','1');
    p.setAttribute('stroke-linecap','round');
    p.setAttribute('opacity','.1');
    ag.appendChild(p);
    arcEls.push({el:p,cx,cy,arcR,i});
  }
  svgEl.appendChild(ag);

  // 7 tuning fork tines
  const tg=document.createElementNS('http://www.w3.org/2000/svg','g');
  for(let i=0;i<7;i++){
    const x=cx-tuneSpan/2+i*(tuneSpan/6);
    const ln=document.createElementNS('http://www.w3.org/2000/svg','line');
    ln.setAttribute('x1',x); ln.setAttribute('y1',tuneY0);
    ln.setAttribute('x2',x); ln.setAttribute('y2',tuneY0+tuneMaxH*.15);
    ln.setAttribute('stroke','#3DF2E0');
    ln.setAttribute('stroke-width','1.5');
    ln.setAttribute('stroke-linecap','round');
    ln.setAttribute('opacity','.15');
    tg.appendChild(ln);
    lineEls.push({el:ln,x,y0:tuneY0,maxH:tuneMaxH});
  }
  svgEl.appendChild(tg);
}

function updateSVG(){
  if(!arcEls.length) return;
  const {cx,cy,arcR}=arcEls[0];
  const domHouseIdx=S.dominantHouse-1;

  arcEls.forEach(({el,i})=>{
    const mass=S.houseMasses[i]||0;
    const nm=Math.min(mass/5,1);
    const a0=(i/12)*Math.PI*2-Math.PI/2;
    const a1=((i+1)/12)*Math.PI*2-Math.PI/2-.025;
    const x1=cx+arcR*Math.cos(a0),y1=cy+arcR*Math.sin(a0);
    const x2=cx+arcR*Math.cos(a1),y2=cy+arcR*Math.sin(a1);
    el.setAttribute('d',`M${x1} ${y1} A${arcR} ${arcR} 0 0 1 ${x2} ${y2}`);
    const isDom=(i===domHouseIdx);
    el.setAttribute('opacity',(isDom ? Math.min(.1+nm*.9,1) : .08+nm*.55).toFixed(2));
    el.setAttribute('stroke-width',(isDom ? (1+nm*3).toFixed(1) : (.7+nm*1.8).toFixed(1)));
  });

  const total=Math.max(S.torchWeights.reduce((a,b)=>a+b,0),1);
  const activeIdx=TORCH_IDS.indexOf(S.routedTorch);
  lineEls.forEach(({el,y0,maxH,x},i)=>{
    const w=S.torchWeights[i]||0;
    const nm=Math.min(w/total*7,1);
    const h=8+nm*maxH;
    el.setAttribute('y2',y0+h);
    const isActive=(i===activeIdx);
    el.setAttribute('opacity',(isActive ? Math.min(.15+nm*.85,1) : .12+nm*.55).toFixed(2));
    el.setAttribute('stroke-width',(isActive ? (1+nm*1.8).toFixed(1) : (.8+nm*.9).toFixed(1)));
    el.setAttribute('stroke',isActive?'#7FFFEE':'#3DF2E0');
  });
}

// ─── HUD ─────────────────────────────────────────────────────────────────────
function updateHUD(){
  document.getElementById('mode-token').textContent=
    `H${S.dominantHouse} \u00b7 ${S.routedTorch} \u00b7 ${S.routedRing} \u00b7 ${S.routedEcho}`;
  document.getElementById('house-word').textContent=HOUSE_WORDS[S.dominantHouse-1]||'SUBCONSCIOUS';
  document.getElementById('torch-state').textContent=TORCH_WORDS[S.routedTorch]||'FLOWING';
}

// ─── Interaction ─────────────────────────────────────────────────────────────
let drag=false, px=0, py=0;
const dc=renderer.domElement;
dc.addEventListener('mousedown',e=>{drag=true;px=e.clientX;py=e.clientY});
dc.addEventListener('mousemove',e=>{
  if(!drag)return;
  root.rotation.y+=(e.clientX-px)*.005;
  root.rotation.x+=(e.clientY-py)*.004;
  px=e.clientX;py=e.clientY;
});
dc.addEventListener('mouseup',()=>drag=false);
dc.addEventListener('mouseleave',()=>drag=false);

let tx=0,ty=0,pd=0,pfov=60;
dc.addEventListener('touchstart',e=>{
  if(e.touches.length===1){tx=e.touches[0].clientX;ty=e.touches[0].clientY;drag=true;}
  else if(e.touches.length===2){
    pd=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);
    pfov=camera.fov;drag=false;
  }
},{passive:true});
dc.addEventListener('touchmove',e=>{
  if(e.touches.length===1&&drag){
    root.rotation.y+=(e.touches[0].clientX-tx)*.005;
    root.rotation.x+=(e.touches[0].clientY-ty)*.003;
    tx=e.touches[0].clientX;ty=e.touches[0].clientY;
  }else if(e.touches.length===2){
    const d=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);
    camera.fov=Math.max(30,Math.min(90,pfov*(pd/d)));
    camera.updateProjectionMatrix();
  }
},{passive:true});
dc.addEventListener('touchend',()=>drag=false);

// ─── API ─────────────────────────────────────────────────────────────────────
let routing=false;
const exprEl=document.getElementById('expr');
const echoEl=document.getElementById('echo-text');

async function route(text){
  if(routing||!text.trim())return;
  routing=true; S.energy=1.0;
  try{
    const r=await fetch('/api/aum',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({rawInput:text.trim(),userId:UID,surfaceType:'browser',sessionId:crypto.randomUUID()})
    });
    if(!r.ok) throw new Error('HTTP '+r.status);
    const d=await r.json();
    if(d.massUpdate) d.massUpdate.forEach(({houseId,delta})=>{
      const i=parseInt((houseId||'').replace('H',''))-1;
      if(i>=0&&i<12) S.houseMasses[i]=Math.min((S.houseMasses[i]||0)+delta,5);
    });
    if(d.torchWeights) TORCH_IDS.forEach((id,i)=>{ S.torchWeights[i]=d.torchWeights[id]||0; });
    if(d.routedTorch)  S.routedTorch=d.routedTorch;
    if(d.routedRing)   S.routedRing=d.routedRing;
    if(d.routedEcho)   S.routedEcho=d.routedEcho;
    if(d.dominantHouse) S.dominantHouse=parseInt((d.dominantHouse||'H7').replace('H',''));
    updateHUD(); updateSVG();
    const txt=d.echoText||(d.echo&&d.echo.outputText)||'';
    if(txt){echoEl.textContent=txt;echoEl.classList.add('on');setTimeout(()=>echoEl.classList.remove('on'),9000);}
  }catch(e){
    console.error('[Aum]',e);
    echoEl.textContent='—';echoEl.classList.add('on');
    setTimeout(()=>echoEl.classList.remove('on'),1500);
  }finally{
    routing=false;
    setTimeout(()=>{S.energy=.5;},3500);
  }
}

exprEl.addEventListener('keydown',e=>{
  if(e.key==='Enter'){route(exprEl.value);exprEl.value='';}
});

// ─── Render ──────────────────────────────────────────────────────────────────
const clock=new THREE.Clock();

// Collect all shader mats for time update
function getAllMats(){
  const mats=[];
  root.traverse(o=>{if(o.material&&o.material.uniforms) mats.push(o.material);});
  return mats;
}

function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();
  if(!drag){
    root.rotation.y+=.0008;
    root.rotation.x=Math.sin(t*.09)*.04;
  }
  const mats=getAllMats();
  mats.forEach(m=>{m.uniforms.uTime.value=t; m.uniforms.uEnergy.value=S.energy;});
  // Recycle dead spits
  for(let i=spits.length-1;i>=0;i--){
    const sp=spits[i];
    sp.life+=.016;
    if(sp.life>sp.maxLife){
      root.remove(sp.pts);
      sp.pts.geometry.dispose(); sp.mat.dispose();
      spits.splice(i,1);
      const ns=spawnSpit(); spits.push(ns);
    }
  }
  S.energy+=(.5-S.energy)*.008;
  renderer.render(scene,camera);
}

window.addEventListener('resize',()=>{
  renderer.setSize(W(),H());
  camera.aspect=W()/H(); camera.updateProjectionMatrix();
  arcEls=[]; lineEls=[]; initSVG(); updateSVG();
});

// Boot
initSVG(); updateHUD(); updateSVG();
setTimeout(()=>{
  document.getElementById('boot').classList.add('out');
  setTimeout(()=>{const b=document.getElementById('boot');if(b)b.remove();},1200);
},900);
animate();
</script>
</body>
</html>
